<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGen | AI Image Lab & Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --glass-bg: rgba(15, 15, 25, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a0b2e, #050505);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, .font-cyber {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-border {
            position: relative;
        }

        .neon-border::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .cyber-button {
            background: linear-gradient(45deg, var(--neon-purple), #6a11cb);
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .cyber-button:hover:not(:disabled) {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--neon-purple);
            transform: scale(1.02);
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { background-position: 0 0; }
            to { background-position: 0 100%; }
        }

        .img-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .img-card:hover { transform: scale(1.05); z-index: 10; }
        .img-card .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 10px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        .img-card:hover .overlay { transform: translateY(0); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="grid-bg"></div>

    <header class="max-w-6xl mx-auto flex flex-wrap justify-between items-center mb-12 gap-4">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-cyan-500 rounded-bl-xl rounded-tr-xl rotate-12 flex items-center justify-center shadow-[0_0_15px_#00f2ff]">
                <span class="text-black font-bold text-xl -rotate-12">C</span>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                CyberGen <span class="text-xs opacity-50 font-normal tracking-widest">AI LABS</span>
            </h1>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleSection('generator')" class="text-xs font-cyber text-cyan-400 hover:text-white transition-colors uppercase">Generator</button>
            <button onclick="toggleSection('chat')" class="text-xs font-cyber text-purple-400 hover:text-white transition-colors uppercase">Chat</button>
            <button onclick="toggleSection('youtube')" class="text-xs font-cyber text-red-400 hover:text-white transition-colors uppercase">YouTube</button>
            <button onclick="toggleSettings()" class="glass-panel p-3 rounded-full hover:bg-white/10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan-400"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- Generator Section -->
        <div id="generatorSection" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <section class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-2xl neon-border">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-cyber text-cyan-400">Generator</h2>
                        <select id="activeService" class="bg-black/40 border border-white/10 rounded px-2 py-1 text-[10px] uppercase text-cyan-400 outline-none">
                            <option value="stability">Stability AI</option>
                            <option value="openai">OpenAI DALL-E</option>
                        </select>
                    </div>
                    <textarea id="promptInput" placeholder="Zadaj víziu reality..." 
                        class="w-full h-32 bg-black/40 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-cyan-500 outline-none text-sm resize-none"></textarea>
                    
                    <button id="generateBtn" onclick="generateImage()" class="w-full cyber-button py-4 font-bold text-white uppercase tracking-widest mt-6 flex items-center justify-center gap-2">
                        <span id="btnText">Syntetizovať</span>
                        <div id="loader" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    </button>
                </div>
            </section>
            
            <section class="lg:col-span-8">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="font-cyber text-xs opacity-60">Archív vygenerovaných vizií (IndexedDB)</h3>
                    <button onclick="clearGallery()" class="text-[10px] text-red-400 hover:text-red-300 uppercase">Vymazať archív</button>
                </div>
                <div id="imageGallery" class="grid grid-cols-2 md:grid-cols-3 gap-4 min-h-[400px]"></div>
            </section>
        </div>

        <!-- AI Chat Section -->
        <div id="chatSection" class="hidden max-w-4xl mx-auto">
            <div class="glass-panel rounded-2xl overflow-hidden neon-border">
                <div class="p-6 border-b border-white/10 flex justify-between items-center">
                    <h2 class="text-2xl font-cyber text-purple-400">Neural Chat</h2>
                    <select id="chatModel" class="bg-black/60 border border-purple-500/30 rounded-lg px-4 py-2 text-xs text-purple-400 outline-none">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 (Beta)</option>
                    </select>
                </div>
                <div id="chatMessages" class="chat-container p-6 space-y-4 bg-black/20"></div>
                <div class="p-6 bg-black/40 border-t border-white/10 flex gap-3">
                    <input id="chatInput" type="text" placeholder="Zadaj dopyt do siete..." 
                        class="flex-1 bg-black/60 border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 outline-none"
                        onkeydown="if(event.key === 'Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()" class="p-3 bg-purple-600 hover:bg-purple-500 rounded-xl transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- YouTube Section -->
        <div id="youtubeSection" class="hidden space-y-8">
            <div class="glass-panel p-8 rounded-2xl neon-border">
                <h2 class="text-2xl font-cyber text-red-500 mb-6">YouTube Explorer</h2>
                <div class="flex gap-4 mb-8">
                    <input id="ytSearchQuery" type="text" placeholder="Hľadať v globálnej sieti..." class="flex-1 bg-black/40 border border-white/10 rounded-xl p-4 outline-none">
                    <button onclick="searchYouTube()" class="px-8 bg-red-600 hover:bg-red-500 rounded-xl font-bold uppercase transition-all">Hľadať</button>
                </div>
                <div id="ytResults" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="glass-panel w-full max-w-md rounded-2xl p-8 border-t-4 border-cyan-500">
            <h2 class="text-2xl font-cyber text-cyan-400 mb-6 text-center">SYSTÉMOVÁ KONFIGURÁCIA</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase mb-1">Google API Key (Gemini)</label>
                    <input id="keyGemini" type="password" placeholder="AI Chat kľúč..." class="w-full bg-black/60 border border-white/10 rounded-lg p-3 outline-none text-xs">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase mb-1">OpenAI API Key (DALL-E)</label>
                    <input id="keyOpenAI" type="password" placeholder="GPT & Image kľúč..." class="w-full bg-black/60 border border-white/10 rounded-lg p-3 outline-none text-xs">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase mb-1">Stability AI Key</label>
                    <input id="keyStability" type="password" placeholder="SDXL Image kľúč..." class="w-full bg-black/60 border border-white/10 rounded-lg p-3 outline-none text-xs">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase mb-1">YouTube API Key</label>
                    <input id="keyYouTube" type="password" placeholder="Video Search kľúč..." class="w-full bg-black/60 border border-white/10 rounded-lg p-3 outline-none text-xs">
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full cyber-button py-3 font-bold text-white uppercase text-sm mt-6">Uložiť</button>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="ytModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95">
        <div class="w-full max-w-5xl aspect-video relative glass-panel rounded-2xl overflow-hidden">
            <button onclick="closeVideo()" class="absolute top-4 right-4 z-10 p-2 bg-red-600 rounded-full hover:scale-110 transition-transform text-white">✕</button>
            <div id="ytPlayerContainer" class="w-full h-full"></div>
        </div>
    </div>

    <script>
        let keys = { stability: '', openai: '', gemini: '', youtube: '' };
        const DB_NAME = "CyberGenDatabaseV2";
        const DB_VERSION = 2;
        const STORE_NAME = "images";
        let db;

        // DB INITIALIZATION
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e);
            });
        };

        // UI LOGIC
        function toggleSection(s) {
            document.getElementById('generatorSection').classList.toggle('hidden', s !== 'generator');
            document.getElementById('chatSection').classList.toggle('hidden', s !== 'chat');
            document.getElementById('youtubeSection').classList.toggle('hidden', s !== 'youtube');
        }

        function toggleSettings() {
            document.getElementById('settingsModal').classList.toggle('hidden');
        }

        function saveSettings() {
            keys.stability = document.getElementById('keyStability').value.trim();
            keys.openai = document.getElementById('keyOpenAI').value.trim();
            keys.gemini = document.getElementById('keyGemini').value.trim();
            keys.youtube = document.getElementById('keyYouTube').value.trim();
            localStorage.setItem('cybergen_keys', JSON.stringify(keys));
            toggleSettings();
        }

        // GALLERY ACTIONS
        async function renderGallery() {
            if (!db) await initDB();
            const gallery = document.getElementById('imageGallery');
            gallery.innerHTML = '';
            
            try {
                const transaction = db.transaction(STORE_NAME, "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    const items = request.result.sort((a, b) => b.timestamp - a.timestamp);
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'img-card glass-panel rounded-xl aspect-square';
                        div.style.backgroundImage = `url(${item.url})`;
                        div.innerHTML = `
                            <div class="overlay flex flex-col justify-end h-full">
                                <p class="text-[9px] mb-2 text-cyan-300 line-clamp-2">${item.prompt}</p>
                                <button onclick="deleteImg(${item.id})" class="text-red-500 text-[10px] uppercase font-bold text-left">Odstrániť</button>
                            </div>
                        `;
                        gallery.appendChild(div);
                    });
                };
            } catch (err) {
                console.error("Render failed", err);
            }
        }

        async function addToGallery(data) {
            if (!db) await initDB();
            const transaction = db.transaction(STORE_NAME, "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.add(data);
            transaction.oncomplete = () => renderGallery();
        }

        async function deleteImg(id) {
            const transaction = db.transaction(STORE_NAME, "readwrite");
            transaction.objectStore(STORE_NAME).delete(id);
            transaction.oncomplete = () => renderGallery();
        }

        async function clearGallery() {
            if (!confirm("Naozaj vymazať celú históriu z IndexedDB?")) return;
            const transaction = db.transaction(STORE_NAME, "readwrite");
            transaction.objectStore(STORE_NAME).clear();
            transaction.oncomplete = () => renderGallery();
        }

        // GENERATE IMAGE
        async function generateImage() {
            const service = document.getElementById('activeService').value;
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return;
            
            setLoading(true);
            try {
                let imageUrl = "";
                if (service === 'stability') {
                    if (!keys.stability) throw new Error("Chýba kľúč Stability AI");
                    const resp = await fetch('https://api.stability.ai/v1/generation/stable-diffusion-xl-1024-v1-0/text-to-image', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Authorization': `Bearer ${keys.stability}`,
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            text_prompts: [{ text: prompt }], 
                            height: 1024, 
                            width: 1024,
                            cfg_scale: 7,
                            steps: 30
                        })
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.message || "Chyba API");
                    imageUrl = `data:image/png;base64,${data.artifacts[0].base64}`;
                } else {
                    if (!keys.openai) throw new Error("Chýba kľúč OpenAI");
                    const resp = await fetch('https://api.openai.com/v1/images/generations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.openai}` },
                        body: JSON.stringify({ prompt: prompt, n: 1, size: "1024x1024", model: "dall-e-3" })
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error?.message || "Chyba API");
                    imageUrl = data.data[0].url;
                }

                await addToGallery({ url: imageUrl, prompt, timestamp: Date.now() });
            } catch (err) {
                alert("Generation Error: " + err.message);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(s) {
            document.getElementById('generateBtn').disabled = s;
            document.getElementById('loader').classList.toggle('hidden', !s);
            document.getElementById('btnText').innerText = s ? 'Spracovávam...' : 'Syntetizovať';
        }

        // CHAT LOGIC
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            const modelId = document.getElementById('chatModel').value;
            if (!text || !keys.gemini) return;

            appendMsg('user', text);
            input.value = '';
            const loadingId = 'msg-' + Date.now();
            appendMsg('ai', 'Prebieha analýza neurónovej siete...', loadingId);

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${keys.gemini}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "Chyba Gemini API");

                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Žiadna odozva systému.";
                updateMsg(loadingId, aiText);
            } catch (err) {
                updateMsg(loadingId, `ERROR: ${err.message}`);
            }
        }

        function appendMsg(role, text, id) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            if (id) div.id = id;
            div.className = `p-3 rounded-xl max-w-[85%] ${role === 'user' ? 'bg-cyan-500/10 ml-auto border-r-2 border-cyan-500' : 'bg-purple-500/10 border-l-2 border-purple-500'}`;
            div.innerHTML = `<span class="text-[9px] uppercase font-bold block mb-1 opacity-50">${role === 'user' ? 'Užívateľ' : 'Core-AI'}</span><p class="text-sm leading-relaxed whitespace-pre-wrap">${text}</p>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function updateMsg(id, text) {
            const div = document.getElementById(id);
            if (div) div.querySelector('p').innerText = text;
        }

        // YOUTUBE LOGIC
        async function searchYouTube() {
            const query = document.getElementById('ytSearchQuery').value.trim();
            if (!keys.youtube || !query) return;
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(query)}&type=video&key=${keys.youtube}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                document.getElementById('ytResults').innerHTML = data.items.map(item => `
                    <div class="glass-panel overflow-hidden rounded-xl border border-white/5 group cursor-pointer hover:border-red-500/50 transition-colors" onclick="playVideo('${item.id.videoId}')">
                        <img src="${item.snippet.thumbnails.high.url}" class="w-full aspect-video object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                        <div class="p-4">
                            <h3 class="text-xs font-bold line-clamp-2 text-white/80 group-hover:text-white">${item.snippet.title}</h3>
                            <p class="text-[9px] text-gray-500 mt-1 uppercase">${item.snippet.channelTitle}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                alert("YouTube Sync Error: " + err.message);
            }
        }

        function playVideo(id) {
            document.getElementById('ytPlayerContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" class="w-full h-full" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('ytModal').classList.remove('hidden');
        }

        function closeVideo() {
            document.getElementById('ytModal').classList.add('hidden');
            document.getElementById('ytPlayerContainer').innerHTML = '';
        }

        // LOAD SAVED CONFIG
        window.onload = async () => {
            const saved = localStorage.getItem('cybergen_keys');
            if (saved) {
                keys = JSON.parse(saved);
                document.getElementById('keyStability').value = keys.stability || '';
                document.getElementById('keyOpenAI').value = keys.openai || '';
                document.getElementById('keyGemini').value = keys.gemini || '';
                document.getElementById('keyYouTube').value = keys.youtube || '';
            }
            await initDB();
            renderGallery();
        };
    </script>
</body>
</html>
